<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Tier List - Shared Ranking</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; text-align: center; }
        .tier-container { max-width: 800px; margin: 20px auto; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        .tier-row { display: flex; border-bottom: 1px solid #333; min-height: 100px; }
        .tier-label { width: 100px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; color: #000; }
        .tier-bucket { flex-grow: 1; display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; align-items: center; }
        .band-photo { width: 80px; height: 80px; border-radius: 4px; object-fit: cover; }
        .btn-home { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #1db954; color: white; text-decoration: none; border-radius: 20px; font-weight: bold; }

        /* Mobile Fix */
        @media (max-width: 600px) {
            .tier-label { width: 60px; font-size: 1.2rem; }
            .band-photo { width: 50px; height: 50px; }
            .tier-row { min-height: 70px; }
        }
    </style>
</head>
<body>
    <h1>Music Tier List</h1>
    <p>A friend shared their rankings with you!</p>
    <a href="/" class="btn-home">Create Your Own List</a>

    <div class="tier-container">
        <div class="tier-row"><div class="tier-label" style="background-color: #ff7f7f;">S</div><div class="tier-bucket" id="S-bucket"></div></div>
        <div class="tier-row"><div class="tier-label" style="background-color: #ffbf7f;">A</div><div class="tier-bucket" id="A-bucket"></div></div>
        <div class="tier-row"><div class="tier-label" style="background-color: #ffff7f;">B</div><div class="tier-bucket" id="B-bucket"></div></div>
        <div class="tier-row"><div class="tier-label" style="background-color: #bfff7f;">C</div><div class="tier-bucket" id="C-bucket"></div></div>
        <div class="tier-row"><div class="tier-label" style="background-color: #7fff7f;">D</div><div class="tier-bucket" id="D-bucket"></div></div>
        <div class="tier-row"><div class="tier-label" style="background-color: #7fbfff;">F</div><div class="tier-bucket" id="F-bucket"></div></div>
    </div>

    <script>
        // Use the raw data passed from Flask
        const rawData = {{ data | tojson | safe }};
        const tierData = JSON.parse(rawData);

        // Loop through each tier and inject the images
        Object.keys(tierData).forEach(tier => {
            const bucket = document.getElementById(`${tier}-bucket`);
            if (bucket && tierData[tier]) {
                tierData[tier].forEach(band => {
                    const img = document.createElement('img');
                    img.src = band.image;
                    img.title = band.name;
                    img.classList.add('band-photo');
                    bucket.appendChild(img);
                });
            }
        });
    </script>
</body>
</html>
